# .coderabbit.yaml — agent-hooks (TypeScript, npm library)

reviews:
  auto_review:
    enabled: true

  path_instructions:
    - path: "src/**/*.ts"
      instructions: |
        This is the TypeScript SDK for Sigil agent hooks. It is a published npm package.
        - Verify exported types and interfaces are documented and stable.
        - Flag any use of 'any' type.
        - Check error handling: no swallowed promises, proper rejection propagation.
        - Confirm interceptor patterns follow the existing request/rejection flow.
        - Flag changes to public API surface — these affect downstream consumers and require semver review.

    - path: "src/adapters/**"
      instructions: |
        Adapters bridge agent-hooks to specific agent frameworks.
        - Each adapter must implement the framework registry interface.
        - Check that adapter-specific logic does not leak into core interceptor code.
        - Verify new adapters are registered in framework-registry.ts.

    - path: "tests/**"
      instructions: |
        - Ensure contract fixture tests validate the boundary between this SDK and agent-hooks-rs.
        - Tests should cover edge cases, not just happy paths.
        - Flag tests that assert on implementation details rather than behavior.

    - path: "package.json"
      instructions: |
        - Confirm version follows semver.
        - Check that publish metadata (name, version, main/exports, types, license) is present and correct.
        - Flag missing or overly broad files/exports config.
        - Verify peerDependencies are appropriate for a library.

    - path: "**/*.md"
      instructions: |
        Check for accuracy against the current code. Flag stale references.

  path_filters:
    - "!node_modules/**"
    - "!dist/**"
    - "!*.lock"
