name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org/

      - run: npm install -g npm@11.17.0
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - name: Skip already published version
        id: published
        shell: bash
        run: |
          set -euo pipefail
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          published_version="$(npm view "${package_name}@${package_version}" version 2>/dev/null || true)"

          if [ "${published_version}" = "${package_version}" ]; then
            echo "already_published=true" >> "${GITHUB_OUTPUT}"
            echo "${package_name}@${package_version} is already published."
          else
            echo "already_published=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish to npm
        if: steps.published.outputs.already_published != 'true'
        run: npm publish --access public
