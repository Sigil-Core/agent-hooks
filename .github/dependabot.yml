version: 2
updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    # Group related updates into a single PR each to cut down on noise.
    # Security updates are always created separately (Dependabot default).
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
    # Major version bumps require human review — breakage surface is too wide
    # for automated grouping. Dependabot will still open security PRs for
    # majors if no lower-risk fix is available.
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    labels:
      - dependencies

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    # Same rationale as npm: major bumps require human review.
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    labels:
      - dependencies
      - github-actions
